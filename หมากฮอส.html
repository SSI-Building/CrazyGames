<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Checkers - Pro Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --p1-color: #f8fafc;
            --p2-color: #ef4444;
            --success: #22c55e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 95%;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* --- Panel ด้านซ้าย: กระดาน --- */
        .game-section {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        #status { font-size: 1.1rem; font-weight: 600; transition: 0.3s; }

        .board-wrapper {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            border: 4px solid #0f172a;
            border-radius: 4px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flipped { transform: rotate(180deg); }
        .flipped .piece { transform: rotate(180deg); }

        .cell {
            width: 55px; height: 55px;
            display: flex; justify-content: center; align-items: center;
            position: relative; cursor: pointer;
        }
        .dark { background: #334155; }
        .light { background: #94a3b8; }

        .piece {
            width: 42px; height: 42px; border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
        }
        .p1 { background: radial-gradient(circle at 30% 30%, #fff, #cbd5e1); }
        .p2 { background: radial-gradient(circle at 30% 30%, #fb7185, #e11d48); }
        .king::after { content: '👑'; font-size: 18px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        
        .selected { transform: scale(1.15) translateY(-5px); outline: 3px solid var(--accent); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4); }
        .must-eat { animation: glow 1.5s infinite alternate; border: 2px solid var(--accent); }
        @keyframes glow { from { box-shadow: 0 0 5px var(--accent); } to { box-shadow: 0 0 20px var(--accent); } }

        /* --- Panel ด้านขวา: เชื่อมต่อ & แชท --- */
        .side-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .id-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .id-display {
            background: rgba(15, 23, 42, 0.5);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            border: 1px inset rgba(255,255,255,0.05);
            color: var(--accent);
        }

        input[type="text"] {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-row { display: flex; gap: 8px; margin-top: 5px; }
        button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Prompt', sans-serif;
        }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }

        /* --- Chat System --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 300px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 5px;
            font-size: 0.9rem;
        }
        .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 8px; width: fit-content; max-width: 85%; line-height: 1.4; }
        .msg-me { background: var(--accent); color: #0f172a; margin-left: auto; }
        .msg-them { background: rgba(255,255,255,0.1); color: white; }
        .chat-input-area { display: flex; gap: 5px; }

        .hint { width: 12px; height: 12px; background: var(--success); border-radius: 50%; position: absolute; opacity: 0.6; pointer-events: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="game-section">
        <div class="status-card">
            <div id="status">กำลังเริ่มต้นระบบ...</div>
            <div id="role-display" style="font-size: 0.8rem; opacity: 0.7; margin-top: 5px;">โหมด Offline</div>
        </div>
        
        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>
    </div>

    <div class="side-panel">
        <div class="card">
            <div class="id-group">
                <label style="font-size: 0.85rem; opacity: 0.8;">ID ของคุณ (แชร์ให้เพื่อน)</label>
                <div class="id-display" id="my-id">กำลังดึง ID...</div>
                <div class="btn-row">
                    <button class="btn-secondary" onclick="copyMyId()">คัดลอก ID</button>
                </div>
                <hr style="width: 100%; opacity: 0.1; margin: 10px 0;">
                <input type="text" id="join-id" placeholder="วาง ID เพื่อนที่นี่...">
                <button class="btn-primary" onclick="connectToPeer()">เชื่อมต่อเข้าห้อง</button>
            </div>
        </div>

        <div class="card chat-container">
            <div style="font-weight: 600; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px;">
                💬 แชทกับคู่แข่ง
            </div>
            <div class="chat-messages" id="chat-box">
                <div style="opacity: 0.4; text-align: center; margin-top: 20px;">เชื่อมต่อเพื่อเริ่มคุย...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-primary" style="flex: 0; padding: 0 15px;" onclick="sendChat()">ส่ง</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- NETWORK & CHAT LOGIC ---
let peer, conn;
let myRole = 'p1'; 
let isOnline = false;

function initPeer() {
    peer = new Peer();
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    
    peer.on('connection', c => {
        if (conn) conn.close(); 
        conn = c;
        myRole = 'p1';
        isOnline = true;
        setupConn();
        document.getElementById('role-display').innerText = "คุณคือ: ฝั่งขาว (เดินล่าง)";
        document.getElementById('board').classList.remove('flipped');
        resetGame();
    });
}

function connectToPeer() {
    const targetId = document.getElementById('join-id').value.trim();
    if (!targetId) return alert("กรุณาวาง ID ของเพื่อนก่อน");
    
    conn = peer.connect(targetId);
    myRole = 'p2';
    isOnline = true;
    setupConn();
    document.getElementById('role-display').innerText = "คุณคือ: ฝั่งแดง (เดินล่าง)";
    document.getElementById('board').classList.add('flipped');
}

function setupConn() {
    conn.on('open', () => {
        document.getElementById('status').innerText = "เชื่อมต่อแล้ว! เริ่มเกมได้";
        document.getElementById('status').style.color = "var(--success)";
        document.getElementById('chat-box').innerHTML = '<div style="text-align:center; opacity:0.5; font-size:0.8rem;">ระบบเชื่อมต่อสำเร็จ คุยกันได้เลย</div>';
        render();
    });
    conn.on('data', data => {
        if (data.type === 'MOVE') {
            executeMove(data.from, data.to);
            turn = data.nextTurn;
            isMultiJumping = data.isMulti;
            if(isMultiJumping) selected = { r: data.to.r, c: data.to.c, moves: getValidMoves(data.to.r, data.to.c, board, true) };
            else selected = null;
            render();
        } else if (data.type === 'CHAT') {
            appendChat('them', data.msg);
        }
    });
}

function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg || !conn || !conn.open) return;
    
    conn.send({ type: 'CHAT', msg: msg });
    appendChat('me', msg);
    input.value = '';
}

function appendChat(who, text) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg msg-${who}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function copyMyId() {
    const id = document.getElementById('my-id').innerText;
    if (id.includes('กำลัง')) return;
    navigator.clipboard.writeText(id);
    const btn = event.target;
    btn.innerText = "คัดลอกแล้ว!";
    setTimeout(() => btn.innerText = "คัดลอก ID", 2000);
}

// --- GAME LOGIC (CORE) ---
const SIZE = 8;
let board = [], turn = 'p1', selected = null, isMultiJumping = false;

function initBoard() {
    board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
    for (let r=0; r<2; r++) for (let c=0; c<SIZE; c++) if ((r+c)%2!==0) board[r][c] = {p:'p2', king:false};
    for (let r=6; r<8; r++) for (let c=0; c<SIZE; c++) if ((r+c)%2!==0) board[r][c] = {p:'p1', king:false};
}

function getValidMoves(r, c, b, forceEatOnly = false) {
    const p = b[r][c]; if (!p) return [];
    let ms = [], caps = [];
    const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    const fwd = p.p === 'p1' ? -1 : 1;

    if (p.king) {
        dirs.forEach(([dr, dc]) => {
            let tr = r + dr, tc = c + dc, enemyPos = null;
            while (tr >= 0 && tr < SIZE && tc >= 0 && tc < SIZE) {
                if (!enemyPos) {
                    if (b[tr][tc]) {
                        if (b[tr][tc].p !== p.p) enemyPos = {r: tr, c: tc};
                        else break;
                    } else if (!forceEatOnly) ms.push({r: tr, c: tc});
                } else {
                    if (!b[tr][tc]) caps.push({r: tr, c: tc, eat: enemyPos});
                    else break;
                }
                tr += dr; tc += dc;
            }
        });
    } else {
        dirs.forEach(([dr, dc]) => {
            const tr = r + dr, tc = c + dc, nr = r + dr * 2, nc = c + dc * 2;
            if (dr === fwd && nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                if (b[tr][tc] && b[tr][tc].p !== p.p && !b[nr][nc]) caps.push({r: nr, c: nc, eat: {r: tr, c: tc}});
            }
            if (!forceEatOnly && dr === fwd && tr >= 0 && tr < SIZE && tc >= 0 && tc < SIZE) {
                if (!b[tr][tc]) ms.push({r: tr, c: tc});
            }
        });
    }
    return caps.length > 0 ? caps : (forceEatOnly ? [] : ms);
}

function getAllPossible(player, b) {
    let all = [];
    for(let r=0; r<SIZE; r++) {
        for(let c=0; c<SIZE; c++) {
            if(b[r][c]?.p === player) {
                const moves = getValidMoves(r, c, b);
                if(moves.length > 0) all.push({from: {r, c}, list: moves});
            }
        }
    }
    const hasCapture = all.some(a => a.list.some(m => m.eat));
    if (hasCapture) return all.filter(a => a.list.some(m => m.eat)).map(a => ({from: a.from, list: a.list.filter(m => m.eat)}));
    return all;
}

function executeMove(from, to, b = board) {
    const p = b[from.r][from.c];
    const moves = getValidMoves(from.r, from.c, b);
    const m = moves.find(x => x.r === to.r && x.c === to.c);
    if (!m) return false;
    b[to.r][to.c] = p; b[from.r][from.c] = null;
    if (m.eat) b[m.eat.r][m.eat.c] = null;
    let promoted = false;
    if (!p.king && ((p.p === 'p1' && to.r === 0) || (p.p === 'p2' && to.r === 7))) { p.king = true; promoted = true; }
    return m.eat && !promoted && getValidMoves(to.r, to.c, b, true).length > 0;
}

function handleCellClick(r, c) {
    if (isOnline && turn !== myRole) return;
    const allPossible = getAllPossible(turn, board);
    const hasCapture = allPossible.some(a => a.list.some(m => m.eat));

    if (board[r][c]?.p === turn) {
        if (isMultiJumping) return;
        const canCapture = allPossible.find(a => a.from.r === r && a.from.c === c);
        if (hasCapture && (!canCapture || !canCapture.list[0].eat)) return;
        if (canCapture) selected = { r, c, moves: canCapture.list };
    } else if (selected) {
        const m = selected.moves.find(x => x.r === r && x.c === c);
        if (m) {
            const fromPos = {r: selected.r, c: selected.c};
            const jumping = executeMove(fromPos, {r, c});
            let nextTurn = turn;
            if (!jumping) nextTurn = turn === 'p1' ? 'p2' : 'p1';
            if (isOnline) conn.send({ type: 'MOVE', from: fromPos, to: {r, c}, nextTurn, isMulti: jumping });

            if (jumping) {
                isMultiJumping = true;
                selected = { r, c, moves: getValidMoves(r, c, board, true) };
            } else {
                isMultiJumping = false;
                selected = null;
                turn = nextTurn;
            }
        }
    }
    render();
}

function render() {
    const el = document.getElementById('board'); el.innerHTML = '';
    const allPossible = getAllPossible(turn, board);
    const hasCapture = allPossible.some(a => a.list.some(m => m.eat));

    board.forEach((row, r) => row.forEach((p, c) => {
        const cell = document.createElement('div');
        cell.className = `cell ${(r+c)%2===0?'light':'dark'}`;
        if (p) {
            const pEl = document.createElement('div');
            pEl.className = `piece ${p.p} ${p.king?'king':''} ${selected?.r===r&&selected?.c===c?'selected':''}`;
            if (turn === p.p && hasCapture && allPossible.some(a => a.from.r === r && a.from.c === c)) pEl.classList.add('must-eat');
            cell.appendChild(pEl);
        }
        if (selected?.moves?.some(m => m.r === r && m.c === c)) {
            const h = document.createElement('div'); h.className = 'hint'; cell.appendChild(h);
        }
        cell.onclick = () => handleCellClick(r, c);
        el.appendChild(cell);
    }));
    
    const turnName = turn === 'p1' ? "ขาว" : "แดง";
    const statusEl = document.getElementById('status');
    if (isOnline) {
        statusEl.innerText = turn === myRole ? `ตาของคุณเดิน (${turnName})` : `รอฝั่งตรงข้ามเดิน... (${turnName})`;
        statusEl.style.color = turn === myRole ? "var(--accent)" : "#f43f5e";
    } else {
        statusEl.innerText = `ตาฝั่ง${turnName}`;
    }
}

function resetGame() {
    initBoard(); turn='p1'; selected=null; isMultiJumping = false;
    render();
}

initBoard();
initPeer();
render();
</script>
</body>
</html>
