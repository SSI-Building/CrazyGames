<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thai Checkers - Pro Dashboard</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #f1f5f9;
            font-family: 'Prompt', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* --- New Combined Connection Panel --- */
        .conn-panel {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .conn-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }
        
        .id-badge {
            font-size: 0.75rem;
            background: #0f172a;
            padding: 6px 10px;
            border-radius: 6px;
            color: var(--accent);
            border: 1px solid var(--glass-border);
            display: inline-block;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: middle;
        }

        /* --- Matchmaking Button --- */
        .btn-quick-match {
            background: var(--success);
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-quick-match.loading::after {
            content: "";
            position: absolute;
            left: -100%; top: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: loading-scan 1.5s infinite;
        }

        @keyframes loading-scan { 100% { left: 100%; } }

        /* --- Layout Control --- */
        .main-layout { display: flex; width: 100%; max-width: 950px; gap: 10px; justify-content: center; }
        @media (max-width: 768px) { .main-layout { flex-direction: column; align-items: center; } }

        /* --- Board & Pieces --- */
        .board {
            display: grid; grid-template-columns: repeat(8, 1fr);
            width: 92vw; height: 92vw; max-width: 480px; max-height: 480px;
            background: #1e293b; border: 6px solid #111; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.6s ease;
        }
        .flipped { transform: rotate(180deg); }
        .flipped .piece { transform: rotate(180deg); }

        .cell { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .dark { background: #334155; }
        .light { background: #94a3b8; }

        .piece {
            width: 82%; height: 82%; border-radius: 50%;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
        }
        .p1 { background: radial-gradient(circle at 30% 30%, #fff, #cbd5e1); }
        .p2 { background: radial-gradient(circle at 30% 30%, #fb7185, #e11d48); }
        .king::after { content: '👑'; font-size: 1.2rem; }
        .selected { outline: 3px solid var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.05); }

        /* --- Chat Area --- */
        .chat-area {
            flex: 1; width: 100%; max-width: 320px;
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--glass-border);
            display: flex; flex-direction: column; height: 480px;
        }
        @media (max-width: 768px) { .chat-area { height: 200px; max-width: 480px; } }

        .messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 6px 10px; border-radius: 10px; width: fit-content; max-width: 85%; }
        .msg-me { background: var(--accent); color: #0f172a; align-self: flex-end; }
        .msg-them { background: rgba(255,255,255,0.1); align-self: flex-start; }

        button { border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: 600; transition: 0.2s; font-family: 'Prompt'; }
        .btn-blue { background: var(--accent); color: #0f172a; }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: white; }

        .hint { width: 30%; height: 30%; background: #22c55e; border-radius: 50%; opacity: 0.7; position: absolute; pointer-events: none; }
        #status-text { margin-bottom: 8px; font-weight: 600; color: var(--accent); text-align: center; }
    </style>
</head>
<body>

<div class="conn-panel">
    <button id="btn-match" class="btn-quick-match" onclick="startQuickMatch()">🚀 จับคู่อัตโนมัติ (Quick Match)</button>

    <div class="conn-row">
        <div style="flex:1;">
            <span style="font-size: 0.75rem; opacity: 0.7;">ID: </span>
            <span id="my-id" class="id-badge">กำลังโหลด...</span>
            <button class="btn-outline" onclick="copyId()" style="padding: 4px 8px; font-size: 0.7rem;">คัดลอก</button>
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="join-id" placeholder="ID เพื่อน..." style="padding: 8px; width: 110px; background: #0f172a; border: 1px solid var(--glass-border); color: white; border-radius: 6px; font-size: 0.8rem;">
            <button class="btn-blue" onclick="connectPeer()" style="font-size: 0.8rem;">เข้าห้อง</button>
        </div>
    </div>
</div>

<div id="status-text">โหมด Offline</div>

<div class="main-layout">
    <div class="game-area">
        <div class="board" id="board"></div>
    </div>

    <div class="chat-area">
        <div style="padding: 10px; text-align: center; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem;">💬 แชทสด</div>
        <div class="messages" id="chat-msgs"></div>
        <div style="display:flex; padding:8px; gap:5px; background: rgba(0,0,0,0.2);">
            <input type="text" id="chat-in" placeholder="พิมพ์คุย..." style="flex:1; background:#0f172a; border:1px solid var(--glass-border); color:white; border-radius:5px; padding:8px;" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn-blue" onclick="sendMsg()">ส่ง</button>
        </div>
    </div>
</div>

<script>
let peer, conn, myRole = 'p1', isOnline = false;
const SIZE = 8;
let board = [], turn = 'p1', selected = null, isMultiJumping = false;

// --- MATCHMAKING LOGIC ---
const LOBBY_IDS = Array.from({length: 10}, (_, i) => `thai_checkers_lobby_${i+1}`);

function initPeer() {
    peer = new Peer();
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => {
        if(isOnline) return; // กันคนอื่นแทรกขณะเล่น
        conn = c; myRole = 'p1'; isOnline = true;
        document.getElementById('board').classList.remove('flipped');
        document.getElementById('btn-match').innerText = "🎮 พบคู่แข่งแล้ว!";
        document.getElementById('btn-match').classList.remove('loading');
        setupConn(); resetGame();
    });
}

async function startQuickMatch() {
    const btn = document.getElementById('btn-match');
    btn.classList.add('loading');
    btn.disabled = true;
    btn.innerText = "🔍 กำลังค้นหาคู่แข่ง...";
    
    // ลองสุ่มเชื่อมต่อกับห้อง Lobby
    for (const lobbyId of LOBBY_IDS.sort(() => Math.random() - 0.5)) {
        try {
            const tempConn = peer.connect(lobbyId);
            const success = await new Promise(res => {
                const timer = setTimeout(() => { tempConn.close(); res(false); }, 2000);
                tempConn.on('open', () => { clearTimeout(timer); res(true); });
            });

            if (success) {
                conn = tempConn;
                myRole = 'p2'; isOnline = true;
                document.getElementById('board').classList.add('flipped');
                btn.innerText = "✅ เชื่อมต่อสำเร็จ!";
                btn.classList.remove('loading');
                setupConn();
                return;
            }
        } catch(e) {}
    }

    // ถ้าไม่เจอใคร ให้เรา "จอง" ชื่อ Lobby นั้นแทน (ถ้า PeerJS ยอมให้จอง)
    // แต่สำหรับระบบ P2P ฟรี วิธีที่เสถียรที่สุดคือให้คนหนึ่งรอรับสาย (Incoming)
    btn.innerText = "📡 ไม่พบห้องว่าง... กำลังรอคนมาจับคู่";
    document.getElementById('status-text').innerText = "คุณเป็น Host ของห้อง... โปรดรอสักครู่";
    // ระบบจะทำงานต่ออัตโนมัติเมื่อมีคนอื่นกด Quick Match แล้วสุ่มมาเจอ Peer ID ของเรา
}

function connectPeer() {
    const tid = document.getElementById('join-id').value.trim();
    if(!tid) return;
    conn = peer.connect(tid);
    myRole = 'p2'; isOnline = true;
    document.getElementById('board').classList.add('flipped');
    setupConn();
}

function setupConn() {
    conn.on('open', () => {
        document.getElementById('status-text').innerText = (myRole==='p1'?"ฝั่งขาว (คุณ)":"ฝั่งแดง (คุณ)");
        addMsg('system', '--- เริ่มเกมได้ ---');
        render();
    });
    conn.on('data', data => {
        if(data.type === 'MOVE') {
            executeMove(data.from, data.to);
            turn = data.nextTurn;
            isMultiJumping = data.isMulti;
            if(isMultiJumping) selected = { r: data.to.r, c: data.to.c, moves: getValidMoves(data.to.r, data.to.c, board, true) };
            else selected = null;
            render();
        } else if(data.type === 'CHAT') addMsg('them', data.msg);
    });
}

// --- GAME LOGIC ---
function initBoard() {
    board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
    for (let r=0; r<2; r++) for (let c=0; c<SIZE; c++) if ((r+c)%2!==0) board[r][c] = {p:'p2', king:false};
    for (let r=6; r<8; r++) for (let c=0; c<SIZE; c++) if ((r+c)%2!==0) board[r][c] = {p:'p1', king:false};
}

function getValidMoves(r, c, b, forceEatOnly = false) {
    const p = b[r][c]; if (!p) return [];
    let ms = [], caps = [];
    const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    const fwd = p.p === 'p1' ? -1 : 1;

    if (p.king) {
        dirs.forEach(([dr, dc]) => {
            let tr = r + dr, tc = c + dc, enemyPos = null;
            while (tr >= 0 && tr < SIZE && tc >= 0 && tc < SIZE) {
                if (!enemyPos) {
                    if (b[tr][tc]) {
                        if (b[tr][tc].p !== p.p) enemyPos = {r: tr, c: tc};
                        else break;
                    } else if (!forceEatOnly) ms.push({r: tr, c: tc});
                } else {
                    if (!b[tr][tc]) caps.push({r: tr, c: tc, eat: enemyPos});
                    else break;
                }
                tr += dr; tc += dc;
            }
        });
    } else {
        dirs.forEach(([dr, dc]) => {
            const tr = r + dr, tc = c + dc, nr = r + dr * 2, nc = c + dc * 2;
            if (dr === fwd && nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                if (b[tr][tc] && b[tr][tc].p !== p.p && !b[nr][nc]) caps.push({r: nr, c: nc, eat: {r: tr, c: tc}});
            }
            if (!forceEatOnly && dr === fwd && tr >= 0 && tr < SIZE && tc >= 0 && tc < SIZE) {
                if (!b[tr][tc]) ms.push({r: tr, c: tc});
            }
        });
    }
    return caps.length > 0 ? caps : (forceEatOnly ? [] : ms);
}

function executeMove(from, to, b = board) {
    const p = b[from.r][from.c];
    const moves = getValidMoves(from.r, from.c, b);
    const m = moves.find(x => x.r === to.r && x.c === to.c);
    if (!m) return false;
    b[to.r][to.c] = p; b[from.r][from.c] = null;
    if (m.eat) b[m.eat.r][m.eat.c] = null;
    let promoted = false;
    if (!p.king && ((p.p === 'p1' && to.r === 0) || (p.p === 'p2' && to.r === 7))) { p.king = true; promoted = true; }
    return m.eat && !promoted && getValidMoves(to.r, to.c, b, true).length > 0;
}

function handleCellClick(r, c) {
    if (isOnline && turn !== myRole) return;
    const all = [];
    for(let i=0; i<SIZE; i++) for(let j=0; j<SIZE; j++) {
        if(board[i][j]?.p === turn) {
            const m = getValidMoves(i, j, board);
            if(m.length) all.push({from:{r:i,c:j}, list:m});
        }
    }
    const hasCap = all.some(a => a.list.some(m => m.eat));

    if (board[r][c]?.p === turn) {
        if (isMultiJumping) return;
        const canMove = all.find(a => a.from.r === r && a.from.c === c);
        if (hasCap && (!canMove || !canMove.list.some(m => m.eat))) return;
        if (canMove) selected = { r, c, moves: hasCap ? canMove.list.filter(m => m.eat) : canMove.list };
    } else if (selected) {
        const m = selected.moves.find(x => x.r === r && x.c === c);
        if (m) {
            const f = {r:selected.r, c:selected.c};
            const jumping = executeMove(f, {r, c});
            let nextTurn = jumping ? turn : (turn==='p1'?'p2':'p1');
            if (isOnline) conn.send({type:'MOVE', from:f, to:{r:c}, nextTurn, isMulti:jumping});
            if (jumping) {
                isMultiJumping = true;
                selected = { r, c, moves: getValidMoves(r, c, board, true) };
            } else {
                isMultiJumping = false; selected = null; turn = nextTurn;
            }
        }
    }
    render();
}

function render() {
    const el = document.getElementById('board'); el.innerHTML = '';
    board.forEach((row, r) => row.forEach((p, c) => {
        const cell = document.createElement('div');
        cell.className = `cell ${(r+c)%2===0?'light':'dark'}`;
        if (p) {
            const pEl = document.createElement('div');
            pEl.className = `piece ${p.p} ${p.king?'king':''} ${selected?.r===r&&selected?.c===c?'selected':''}`;
            cell.appendChild(pEl);
        }
        if (selected?.moves?.some(m => m.r === r && m.c === c)) {
            const h = document.createElement('div'); h.className = 'hint'; cell.appendChild(h);
        }
        cell.onclick = () => handleCellClick(r, c);
        el.appendChild(cell);
    }));
    const status = document.getElementById('status-text');
    const turnName = turn === 'p1' ? "ขาว" : "แดง";
    status.innerText = (turn === myRole) ? `ตาของคุณ (${turnName})` : `รอฝั่งตรงข้าม (${turnName})`;
    status.style.color = (turn === myRole) ? "var(--accent)" : "#ef4444";
}

function sendMsg() {
    const inp = document.getElementById('chat-in');
    if(!inp.value.trim() || !conn) return;
    conn.send({type:'CHAT', msg: inp.value});
    addMsg('me', inp.value);
    inp.value = '';
}

function addMsg(who, text) {
    const box = document.getElementById('chat-msgs');
    const div = document.createElement('div');
    div.className = `msg msg-${who}`;
    if(who==='system') div.style="font-size:0.7rem; opacity:0.5; align-self:center;";
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function copyId() {
    navigator.clipboard.writeText(document.getElementById('my-id').innerText);
    alert("คัดลอก ID แล้ว");
}

function resetGame() { initBoard(); turn='p1'; selected=null; render(); }
initBoard(); initPeer(); render();
</script>
</body>
</html>
